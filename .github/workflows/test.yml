name: CI

on:
  push:
    branches: ["master", "development"]
  pull_request:
    branches: ["master", "development"]

defaults:
  run:
    working-directory: api

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Check formatting
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './.gocache/*' -not -path './.gomodcache/*'))
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build -v ./...

  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run unit tests
        run: go test -v ./...

  integration-tests:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17.4
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shopware_testenv_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d shopware_testenv_platform"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DATABASE_DSN: host=127.0.0.1 port=5432 dbname=shopware_testenv_platform user=postgres password=postgres sslmode=disable

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Run integration tests
        run: go test -v -tags=integration ./internal/http ./internal/repositories/...

  swagger:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: api/go.mod
          cache-dependency-path: api/go.sum

      - name: Regenerate Swagger docs
        run: go generate ./cmd/api

      - name: Check generated docs are committed
        run: git diff --exit-code -- docs/
