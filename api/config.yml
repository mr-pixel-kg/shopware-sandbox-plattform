logging:
  level: "info"
  format: "json"

server:
  port: 8080
  app_url: "https://sandbox-api.zion.mr-pixel.de"
  allowed_origins:
    - "https://sandbox.zion.mr-pixel.de"

database:
  host: "database"
  port: 5432
  user: "mrpix_sandbox"
  password: ""   # set via DB_PASSWORD env
  name: "mrpix_sandbox"
  sslmode: "disable"

auth:
  jwt_secret: ""  # set via JWT_SECRET env
  jwt_ttl_minutes: 480
  guest_jwt_ttl_minutes: 43200
  guest_cookie_name: "shopshredder_guest"

sandbox:
  url_prefix: "sandbox-"
  url_suffix: ".zion.mr-pixel.de"
  default_lifetime: 60
  max_lifetime: 1440
  cleanup_interval_seconds: 60
  internal_port: 80

docker:
  mode: "traefik"
  network: "internal"
  traefik_enable: true
  traefik_entrypoints: "websecure"
  traefik_certresolver: "production"
  traefik_middlewares: "sandbox-middleware@file,https-redirect@file"

storage:
  thumbnail_dir: "storage/thumbnails"

guard:
  max_total_sandboxes: 32
  max_sandboxes_per_ip: 5
  max_sandboxes_per_user: 10
