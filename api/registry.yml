images:
  - match: "dockware/*"
    ssh:
      port: 22
      username: "dockware"
      password: "dockware"
    internal_port: 80
    metadata:
      - key: "admin_user"
        label: "Admin Username"
        type: "field"
        value: "admin"
        input: "text"
        required: true
        condition: "ready"
        icon: "user"
      - key: "admin_password"
        label: "Admin Password"
        type: "field"
        value: "shopware"
        input: "password"
        required: true
        condition: "ready"
        icon: "lock"
      - key: "app_env"
        label: "App Env"
        type: "field"
        value: "prod"
        input: "text"
        required: true
        icon: "file-box"
      - key: "open_admin"
        label: "Admin"
        type: "action"
        value: "{{.URL}}/admin"
        variant: "default"
        condition: "ready"
        icon: "shield"
      - key: "open_storefront"
        label: "Storefront"
        type: "action"
        value: "{{.URL}}"
        variant: "outline"
        condition: "ready"
        icon: "store"
    env:
      TRUSTED_PROXIES: "{{.TrustedProxies}}"
      SHOP_DOMAIN: "{{.Hostname}}"
      APP_URL: "{{.URL}}"
      APP_ENV: "{{.Meta.app_env}}"
    post_start:
      - label: "Wait for Shopware readiness"
        command: ["bash", "-c", "for i in $(seq 1 60); do test -x /var/www/html/bin/console && mysql -u root -proot -h 127.0.0.1 -P 3306 shopware -e 'SELECT 1' >/dev/null 2>&1 && cd /var/www/html && bin/console about >/dev/null 2>&1 && exit 0; sleep 2; done; exit 1"]
        delay: 3s
        timeout: 180s
      - label: "Configure trusted proxies"
        command: ["bash", "-c", "mkdir -p /var/www/html/config/packages && printf 'framework:\\n    trusted_proxies: \"127.0.0.1,REMOTE_ADDR\"\\n' > /var/www/html/config/packages/framework.yaml"]
        delay: 1s
        timeout: 30s
        retries: 2
        retry_delay: 3s
      - label: "Write .env.local"
        command: ["bash", "-c", "printf 'APP_ENV={{.Meta.app_env}}\\nAPP_URL={{.URL}}\\n' > /var/www/html/.env.local"]
        timeout: 10s
        retries: 2
        retry_delay: 3s
      - label: "Update sales channel domains"
        command: ["bash", "-c", "mysql -u root -proot -h 127.0.0.1 -P 3306 shopware -e \"UPDATE IGNORE sales_channel_domain SET url='{{.URL}}' WHERE url <> '{{.URL}}';\" && mysql -u root -proot -h 127.0.0.1 -P 3306 shopware -e \"DELETE FROM sales_channel_domain WHERE url <> '{{.URL}}';\""]
        timeout: 60s
        retries: 3
        retry_delay: 5s
      - label: "Configure admin user"
        command: ["bash", "-c", "cd /var/www/html && if bin/console user:change-password '{{.Meta.admin_user}}' --password='{{.Meta.admin_password}}' 2>/dev/null; then true; else bin/console user:create --admin --no-interaction --email=admin@example.com --firstName=Admin --lastName=Admin --password='{{.Meta.admin_password}}' '{{.Meta.admin_user}}'; fi"]
        delay: 2s
        timeout: 60s
        retries: 3
        retry_delay: 5s
      - label: "Resolve app URL change"
        command: ["bash", "-c", "cd /var/www/html && if bin/console list --raw 2>/dev/null | grep -q '^app:shop-id:change'; then bin/console app:shop-id:change move-shop-permanently; elif bin/console list --raw 2>/dev/null | grep -q '^app:url-change:resolve'; then bin/console app:url-change:resolve move-shop-permanently; fi"]
        delay: 2s
        timeout: 120s
        retries: 3
        retry_delay: 10s
      - label: "Clear cache"
        command: ["bash", "-c", "cd /var/www/html && bin/console cache:clear"]
        delay: 1s
        timeout: 60s
        retries: 3
        retry_delay: 5s
    logs:
      - key: "container"
        label: "Container Output"
        type: "docker"
      - key: "symfony_dev"
        label: "Symfony Dev Log"
        type: "file"
        path: "/var/www/html/var/log/dev.log"
      - key: "apache_access"
        label: "Apache Access Log"
        type: "file"
        path: "/var/log/apache2/other_vhosts_access.log"
      - key: "apache_error"
        label: "Apache Error Log"
        type: "file"
        path: "/var/log/apache2/error.log"
    health_check:
      path: "/api/_info/health-check"
      timeout: 5s
      interval: 3s
