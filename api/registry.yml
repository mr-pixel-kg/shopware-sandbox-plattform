# yaml-language-server: $schema=./internal/registry/schema/registry.schema.json
images:
  - match: "dockware/*"
    ssh:
      port: 22
      username: "dockware"
      password: "dockware"
    internal_port: 80
    metadata:
      groups:
        - key: credentials
          label: Zugangsdaten
          description: Login für das Shopware-Admin-Panel
        - key: config
          label: Konfiguration
      items:
        - key: admin_user
          label: Admin Username
          type: field
          icon: user
          group: credentials
          visibility:
            contexts: [image.create, image.edit, sandbox.create, sandbox.card, sandbox.details]
          field:
            input: text
            default: admin
            required: true

        - key: admin_password
          label: Admin Password
          type: field
          icon: lock
          group: credentials
          visibility:
            contexts: [image.create, image.edit, sandbox.create, sandbox.card, sandbox.details]
          field:
            input: password
            default: shopware
            required: true
            help_text: Wird für den Login ins Shopware-Admin-Panel verwendet.

        - key: app_env
          label: App Environment
          type: field
          icon: file-box
          group: config
          visibility:
            contexts: [image.create, image.edit, sandbox.create, sandbox.details]
          field:
            input: select
            default: prod
            required: true
            help_text: Steuert Symfony-Environment und Fehler-Verbosity.
            options:
              - { value: prod, label: Production }
              - { value: dev,  label: Development }

        - key: open_admin
          label: Admin
          type: action
          icon: shield
          visibility:
            contexts: [sandbox.card, sandbox.details]
          action:
            url: "{{.URL}}/admin"
            variant: default
            target: _blank

        - key: open_storefront
          label: Storefront
          type: action
          icon: store
          visibility:
            contexts: [sandbox.card, sandbox.details]
          action:
            url: "{{.URL}}"
            variant: outline
            target: _blank
    env:
      TRUSTED_PROXIES: "{{.TrustedProxies}}"
      SHOP_DOMAIN: "{{.Hostname}}"
      APP_URL: "{{.URL}}"
      APP_ENV: "{{.Meta.app_env}}"
    post_start:
      - label: "Wait for Shopware"
        command: ["curl", "-fsS", "http://127.0.0.1/api/_info/health-check"]
        timeout: 10s
        retries: 20
        retry_delay: 2s
      - label: "Write config"
        command: ["sh", "-c", "cd /var/www/html && mkdir -p config/packages && echo 'framework: { trusted_proxies: \"127.0.0.1,REMOTE_ADDR\" }' > config/packages/framework.yaml && printf 'APP_ENV=%s\\nAPP_URL=%s\\n' '{{.Meta.app_env}}' '{{.URL}}' > .env.local"]
        timeout: 10s
      - label: "Update sales channel URL"
        command: ["mysql", "-h127.0.0.1", "-uroot", "-proot", "shopware", "-e", "UPDATE sales_channel_domain SET url='{{.URL}}';"]
        timeout: 30s
      - label: "Ensure admin user"
        command: ["sh", "-c", "cd /var/www/html && bin/console user:change-password '{{.Meta.admin_user}}' --password='{{.Meta.admin_password}}' 2>/dev/null || bin/console user:create --admin --no-interaction --email='{{.Meta.admin_user}}@example.com' --firstName=Admin --lastName=Admin --password='{{.Meta.admin_password}}' '{{.Meta.admin_user}}'"]
        timeout: 30s
      - label: "Resolve URL change"
        command: ["sh", "-c", "cd /var/www/html && (bin/console app:shop-id:change move-shop-permanently 2>/dev/null || bin/console app:url-change:resolve move-shop-permanently 2>/dev/null || true)"]
        timeout: 60s
    logs:
      - key: "container"
        label: "Container Output"
        type: "docker"
      - key: "symfony_dev"
        label: "Symfony Dev Log"
        type: "file"
        path: "/var/www/html/var/log/dev.log"
      - key: "apache_access"
        label: "Apache Access Log"
        type: "file"
        path: "/var/log/apache2/other_vhosts_access.log"
      - key: "apache_error"
        label: "Apache Error Log"
        type: "file"
        path: "/var/log/apache2/error.log"
    health_check:
      path: "/api/_info/health-check"
      timeout: 5s
      interval: 3s
