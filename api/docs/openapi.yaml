openapi: 3.0.3
info:
  title: Shopshredder Sandbox API
  version: 1.0.0
  description: API for managing public demo sandboxes and internal employee sandboxes.
servers:
  - url: http://localhost:8080
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ErrorDetail:
      type: object
      description: Stable error payload for frontend error handling.
      properties:
        code:
          type: string
          description: Machine-readable error code.
          example: VALIDATION_ERROR
        message:
          type: string
          description: Human-readable error message.
          example: Invalid request body
      required:
        - code
        - message
    ErrorResponse:
      type: object
      properties:
        error:
          $ref: '#/components/schemas/ErrorDetail'
      required:
        - error
    User:
      type: object
      description: Employee account.
      properties:
        id:
          type: string
          format: uuid
          example: 5228c1e6-96e8-4c9b-b5b6-f3fb0fdfd5bf
        email:
          type: string
          format: email
          example: dev@shopshredder.de
        createdAt:
          type: string
          format: date-time
          example: 2026-03-18T09:30:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-18T09:30:00Z
      required:
        - id
        - email
        - createdAt
        - updatedAt
    AuthLoginResponse:
      type: object
      properties:
        token:
          type: string
          description: JWT for authenticated employee routes.
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        user:
          $ref: '#/components/schemas/User'
      required:
        - token
        - user
    RegisterRequest:
      type: object
      description: Payload for creating a new employee account.
      properties:
        email:
          type: string
          format: email
          description: Unique employee email address.
          example: dev@shopshredder.de
        password:
          type: string
          format: password
          minLength: 8
          description: Plain-text password with at least 8 characters.
          example: supersecret123
      required:
        - email
        - password
    LoginRequest:
      type: object
      description: Payload for employee login.
      properties:
        email:
          type: string
          format: email
          description: Employee email address.
          example: dev@shopshredder.de
        password:
          type: string
          format: password
          description: Plain-text password.
          example: supersecret123
      required:
        - email
        - password
    CreateImageRequest:
      type: object
      description: Payload for registering a docker image template.
      properties:
        name:
          type: string
          description: Docker image repository/name without the tag.
          example: ghcr.io/shopshredder/shopware-demo
        tag:
          type: string
          description: Docker image tag.
          example: latest
        title:
          type: string
          nullable: true
          description: Public or internal display title.
          example: Shopware Demo
        description:
          type: string
          nullable: true
          description: Human-readable image description.
          example: Demo image for the public storefront.
        thumbnailUrl:
          type: string
          nullable: true
          description: Optional preview image URL for the storefront card.
          example: https://cdn.shopshredder.de/thumbs/shopware-demo.png
        isPublic:
          type: boolean
          description: Whether this image is visible in the public storefront.
          example: true
      required:
        - name
        - tag
    CreateSandboxRequest:
      type: object
      description: Payload for creating a sandbox from an existing image.
      properties:
        imageId:
          type: string
          format: uuid
          description: Existing image identifier.
          example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        ttlMinutes:
          type: integer
          nullable: true
          description: Optional lifetime in minutes. Ignored for guests if your backend policy enforces a fixed demo lifetime.
          example: 120
      required:
        - imageId
    CreateSnapshotRequest:
      type: object
      description: Payload for committing a running sandbox into a new docker image and registering it as a new image template.
      properties:
        name:
          type: string
          description: Docker image repository/name without the tag.
          example: ghcr.io/shopshredder/shopware-custom
        tag:
          type: string
          description: Docker image tag for the snapshot.
          example: demo-v2
        title:
          type: string
          nullable: true
          description: Title for the new image template.
          example: Shopware Custom Demo V2
        description:
          type: string
          nullable: true
          description: Description for the new image template.
          example: Snapshot taken from a configured employee sandbox.
        thumbnailUrl:
          type: string
          nullable: true
          description: Optional preview image URL for the new template.
          example: https://cdn.shopshredder.de/thumbs/shopware-custom-v2.png
        isPublic:
          type: boolean
          description: Whether the snapshot should be visible in the public storefront.
          example: true
      required:
        - name
        - tag
    Image:
      type: object
      description: Registered docker image template.
      properties:
        id:
          type: string
          format: uuid
          example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        name:
          type: string
          example: ghcr.io/shopshredder/shopware-demo
        tag:
          type: string
          example: latest
        title:
          type: string
          nullable: true
          example: Shopware Demo
        description:
          type: string
          nullable: true
          example: Demo image for the public storefront.
        thumbnailUrl:
          type: string
          nullable: true
          example: https://cdn.shopshredder.de/thumbs/shopware-demo.png
        isPublic:
          type: boolean
          example: true
        createdByUserId:
          type: string
          format: uuid
          nullable: true
          example: 5228c1e6-96e8-4c9b-b5b6-f3fb0fdfd5bf
        createdAt:
          type: string
          format: date-time
          example: 2026-03-18T09:30:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-18T09:30:00Z
      required:
        - id
        - name
        - tag
        - isPublic
        - createdAt
        - updatedAt
    Sandbox:
      type: object
      description: Running or recently tracked sandbox instance.
      properties:
        id:
          type: string
          format: uuid
          example: 2ea6e9d7-82f1-4476-ab4a-7dc0b193a5b9
        imageId:
          type: string
          format: uuid
          example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        createdByUserId:
          type: string
          format: uuid
          nullable: true
          description: Present when the sandbox was created by an authenticated employee.
          example: 5228c1e6-96e8-4c9b-b5b6-f3fb0fdfd5bf
        guestSessionId:
          type: string
          format: uuid
          nullable: true
          description: Present when the sandbox belongs to an anonymous guest session.
          example: 9e0f1a58-ef99-4d0d-b0da-97e0f40f5f38
        status:
          type: string
          description: Current sandbox status.
          example: running
        containerId:
          type: string
          example: stub-sandbox-2ea6e9d7-82f1-4476-ab4a-7dc0b193a5b9
        containerName:
          type: string
          example: sandbox-2ea6e9d7-82f1-4476-ab4a-7dc0b193a5b9
        url:
          type: string
          description: Public sandbox URL.
          example: https://sandbox-2ea6e9d7-82f1-4476-ab4a-7dc0b193a5b9.shopshredder.de
        clientIp:
          type: string
          description: IP address recorded at creation time.
          example: 127.0.0.1
        expiresAt:
          type: string
          format: date-time
          nullable: true
          example: 2026-03-18T10:30:00Z
        createdAt:
          type: string
          format: date-time
          example: 2026-03-18T09:30:00Z
        updatedAt:
          type: string
          format: date-time
          example: 2026-03-18T09:30:00Z
      required:
        - id
        - imageId
        - status
        - containerId
        - containerName
        - url
        - clientIp
        - createdAt
        - updatedAt
    AuditLog:
      type: object
      description: Audited backend action.
      properties:
        id:
          type: string
          format: uuid
          example: d3ee8870-9bbf-4128-810f-98e0f5b0b67c
        userId:
          type: string
          format: uuid
          nullable: true
          example: 5228c1e6-96e8-4c9b-b5b6-f3fb0fdfd5bf
        action:
          type: string
          example: sandbox.created
        ipAddress:
          type: string
          example: 127.0.0.1
        details:
          type: object
          additionalProperties: true
          example:
            sandboxId: 2ea6e9d7-82f1-4476-ab4a-7dc0b193a5b9
            actor: guest
        createdAt:
          type: string
          format: date-time
          example: 2026-03-18T09:30:00Z
      required:
        - id
        - action
        - createdAt
paths:
  /health:
    get:
      summary: Healthcheck
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
  /api/public/images:
    get:
      summary: List public images
      description: Returns the public storefront image catalog.
      responses:
        '200':
          description: Public images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
  /api/public/sandboxes:
    get:
      summary: List current guest sandboxes
      description: |
        Returns sandboxes that belong to the current anonymous guest session.
        The backend identifies the guest via an HTTP-only cookie and will create that cookie automatically on first public access.
      responses:
        '200':
          description: Sandboxes created by the current guest session
          headers:
            Set-Cookie:
              description: May contain the guest session cookie on first access.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sandbox'
  /api/public/demos:
    post:
      summary: Create public demo sandbox
      description: |
        Creates a public demo sandbox for an anonymous guest.
        The guest is tracked via an HTTP-only cookie so the frontend can later load only the guest's own sandboxes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSandboxRequest'
      responses:
        '201':
          description: Sandbox created
          headers:
            Set-Cookie:
              description: Guest session cookie if this is the first public request from the browser.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sandbox limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal sandbox error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/register:
    post:
      summary: Register employee user
      description: Creates a new internal employee account.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              employee:
                value:
                  email: dev@shopshredder.de
                  password: supersecret123
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Validation or registration error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/auth/login:
    post:
      summary: Login employee user
      description: Authenticates an employee and returns a JWT.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              employee:
                value:
                  email: dev@shopshredder.de
                  password: supersecret123
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthLoginResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me:
    get:
      summary: Get current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/me/sandboxes:
    get:
      summary: List own user sandboxes
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Sandboxes of the current employee user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sandbox'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/images:
    get:
      summary: List all images
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Image'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create image
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageRequest'
            examples:
              image:
                value:
                  name: ghcr.io/shopshredder/shopware-demo
                  tag: latest
                  title: Shopware Demo
                  description: Demo image for the public storefront.
                  thumbnailUrl: https://cdn.shopshredder.de/thumbs/shopware-demo.png
                  isPublic: true
      responses:
        '201':
          description: Image created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          description: Validation or creation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/images/{id}:
    delete:
      summary: Delete image
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Image UUID.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '400':
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sandboxes:
    get:
      summary: List all active sandboxes
      description: Returns all active sandboxes across guest and employee usage for internal administration views.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: All active sandboxes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sandbox'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create private sandbox
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSandboxRequest'
            examples:
              sandbox:
                value:
                  imageId: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
                  ttlMinutes: 120
      responses:
        '201':
          description: Sandbox created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Sandbox limit reached
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sandboxes/{id}:
    get:
      summary: Get sandbox by id
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Sandbox UUID.
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Sandbox
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sandbox'
        '400':
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    delete:
      summary: Delete sandbox
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Sandbox UUID.
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Deleted
        '400':
          description: Invalid id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/sandboxes/{id}/snapshot:
    post:
      summary: Commit sandbox into a new docker image
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          description: Sandbox UUID.
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSnapshotRequest'
            examples:
              snapshot:
                value:
                  name: ghcr.io/shopshredder/shopware-custom
                  tag: demo-v2
                  title: Shopware Custom Demo V2
                  description: Snapshot taken from a configured employee sandbox.
                  thumbnailUrl: https://cdn.shopshredder.de/thumbs/shopware-custom-v2.png
                  isPublic: true
      responses:
        '201':
          description: Snapshot created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Sandbox not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Snapshot failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/audit-logs:
    get:
      summary: List audit logs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          required: false
          description: Maximum number of audit log entries to return.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            example: 50
      responses:
        '200':
          description: Audit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/AuditLog'
        '401':
          description: Missing or invalid bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
