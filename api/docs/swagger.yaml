basePath: /
definitions:
  dto.AddWhitelistRequest:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      role:
        enum:
        - admin
        - user
        example: user
        type: string
    required:
    - email
    - role
    type: object
  dto.AuditLogResponse:
    properties:
      action:
        example: sandbox.created
        type: string
      createdAt:
        example: "2026-03-20T10:15:00Z"
        type: string
      details:
        type: object
      id:
        example: 4d0dbf0d-1034-42ef-8b6d-7eb3ceef99cf
        format: uuid
        type: string
      ipAddress:
        example: 203.0.113.25
        type: string
      user:
        $ref: '#/definitions/dto.UserSummary'
    type: object
  dto.AuthLoginResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIs...
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  dto.CreateImageRequest:
    properties:
      description:
        example: Base image for internal sales demos.
        type: string
      isPublic:
        example: true
        type: boolean
      metadata:
        items:
          $ref: '#/definitions/registry.MetadataItem'
        type: array
      name:
        example: dockware/dev
        type: string
      tag:
        example: 6.6.9.0
        type: string
      title:
        example: Shopware 6.6 Demo
        type: string
    required:
    - name
    - tag
    type: object
  dto.CreateSandboxRequest:
    properties:
      displayName:
        example: My Test Shop
        type: string
      imageId:
        example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        format: uuid
        type: string
      metadata:
        additionalProperties:
          type: string
        type: object
      ttlMinutes:
        example: 120
        type: integer
    required:
    - imageId
    type: object
  dto.CreateSnapshotRequest:
    properties:
      description:
        example: Base image for internal sales demos.
        type: string
      isPublic:
        example: true
        type: boolean
      metadata:
        items:
          $ref: '#/definitions/registry.MetadataItem'
        type: array
      name:
        example: dockware/dev
        type: string
      tag:
        example: 6.6.9.0
        type: string
      title:
        example: Shopware 6.6 Demo
        type: string
    required:
    - name
    - tag
    type: object
  dto.CreateUserRequest:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      password:
        example: Sup3rS3cret!
        type: string
      role:
        example: user
        type: string
    type: object
  dto.ErrorDetail:
    properties:
      code:
        example: VALIDATION_ERROR
        type: string
      details:
        type: object
      message:
        example: Invalid request body
        type: string
    type: object
  dto.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/dto.ErrorDetail'
    type: object
  dto.ExtendTTLRequest:
    properties:
      ttlMinutes:
        example: 60
        type: integer
    type: object
  dto.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  dto.ImageProgressEvent:
    properties:
      percent:
        example: 75
        type: integer
      status:
        example: pulling
        type: string
    type: object
  dto.ImageResponse:
    properties:
      createdAt:
        example: "2026-03-20T10:15:00Z"
        type: string
      deletedAt:
        type: string
      description:
        example: Prepared image for sales demos and internal QA.
        type: string
      error:
        example: pull access denied
        type: string
      id:
        example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        format: uuid
        type: string
      isPublic:
        example: true
        type: boolean
      metadata:
        type: string
      name:
        example: dockware/dev
        type: string
      owner:
        $ref: '#/definitions/dto.UserSummary'
      registryRef:
        example: dockware/dev
        type: string
      status:
        example: ready
        type: string
      tag:
        example: 6.6.9.0
        type: string
      thumbnailUrl:
        example: https://cdn.example.com/images/shopware-demo.png
        type: string
      title:
        example: Shopware Demo Image
        type: string
      updatedAt:
        example: "2026-03-20T10:20:00Z"
        type: string
    type: object
  dto.LoginRequest:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      password:
        example: Sup3rS3cret!
        type: string
    required:
    - email
    - password
    type: object
  dto.PendingImageResponse:
    properties:
      id:
        example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        type: string
      name:
        example: dockware/shopware
        type: string
      percent:
        example: 42
        type: integer
      status:
        example: pulling
        type: string
      tag:
        example: 6.6.9.0
        type: string
      title:
        example: Shopware Demo Image
        type: string
    type: object
  dto.RegisterRequest:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      password:
        example: Sup3rS3cret!
        minLength: 8
        type: string
    required:
    - email
    - password
    type: object
  dto.SandboxHealthEvent:
    properties:
      checkedAt:
        example: "2026-03-23T10:15:07Z"
        type: string
      failureReason:
        example: tls_handshake_failed
        type: string
      httpStatus:
        example: 200
        type: integer
      latencyMs:
        example: 412
        type: integer
      message:
        example: Sandbox URL is reachable
        type: string
      ready:
        example: false
        type: boolean
      sandboxId:
        example: 0b443c82-d8a3-49a7-b59a-26ce327c7341
        type: string
      status:
        example: probing
        type: string
      url:
        example: https://sandbox-0b443c82.demo.shopshredder.de
        type: string
    type: object
  dto.SandboxResponse:
    properties:
      clientIp:
        example: 203.0.113.25
        type: string
      containerId:
        example: 1a2b3c4d5e6f7g8h9i0j
        type: string
      containerName:
        example: sandbox-0b443c82
        type: string
      createdAt:
        example: "2026-03-20T10:15:00Z"
        type: string
      deletedAt:
        type: string
      displayName:
        example: My Test Shop
        type: string
      expiresAt:
        example: "2026-03-20T12:00:00Z"
        type: string
      guestSessionId:
        example: db7fcb92-c2ff-4c20-9ac2-5a2504ab6326
        format: uuid
        type: string
      id:
        example: 0b443c82-d8a3-49a7-b59a-26ce327c7341
        format: uuid
        type: string
      imageId:
        example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        format: uuid
        type: string
      lastSeenAt:
        example: "2026-03-20T10:45:00Z"
        type: string
      metadata:
        type: string
      owner:
        $ref: '#/definitions/dto.UserSummary'
      port:
        example: 8080
        type: integer
      stateReason:
        example: Snapshot wird erstellt
        type: string
      status:
        allOf:
        - $ref: '#/definitions/models.SandboxStatus'
        enum:
        - starting
        - running
        - paused
        - stopping
        - stopped
        - expired
        - deleted
        - failed
        example: running
      updatedAt:
        example: "2026-03-20T10:20:00Z"
        type: string
      url:
        example: https://sandbox-0b443c82.demo.shopshredder.de
        type: string
    type: object
  dto.SandboxStreamEvent:
    properties:
      id:
        example: 0b443c82-d8a3-49a7-b59a-26ce327c7341
        type: string
      stateReason:
        example: Container wird gestartet
        type: string
      status:
        example: starting
        type: string
    type: object
  dto.UpdateImageRequest:
    properties:
      description:
        type: string
      isPublic:
        type: boolean
      metadata:
        items:
          $ref: '#/definitions/registry.MetadataItem'
        type: array
      title:
        type: string
    type: object
  dto.UpdateSandboxRequest:
    properties:
      displayName:
        example: My Test Shop
        type: string
    type: object
  dto.UpdateUserRequest:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      password:
        example: N3wSup3rS3cret!
        type: string
      role:
        example: admin
        type: string
    type: object
  dto.UserSummary:
    properties:
      email:
        example: jane.doe@example.com
        type: string
      id:
        example: 5cc66f6f-5c71-4be4-9f2d-639dc4b8c8c2
        format: uuid
        type: string
    type: object
  models.Image:
    properties:
      createdAt:
        example: "2026-03-20T10:15:00Z"
        type: string
      description:
        example: Prepared image for sales demos and internal QA.
        type: string
      error:
        example: pull access denied
        type: string
      id:
        example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        format: uuid
        type: string
      isPublic:
        example: true
        type: boolean
      metadata:
        type: string
      name:
        example: dockware/dev
        type: string
      ownerId:
        example: 5cc66f6f-5c71-4be4-9f2d-639dc4b8c8c2
        format: uuid
        type: string
      registryRef:
        example: dockware/dev
        type: string
      status:
        example: ready
        type: string
      tag:
        example: 6.6.9.0
        type: string
      thumbnailUrl:
        example: https://cdn.example.com/images/shopware-demo.png
        type: string
      title:
        example: Shopware Demo Image
        type: string
      updatedAt:
        example: "2026-03-20T10:20:00Z"
        type: string
    type: object
  models.Sandbox:
    properties:
      clientIp:
        example: 203.0.113.25
        type: string
      containerId:
        example: 1a2b3c4d5e6f7g8h9i0j
        type: string
      containerName:
        example: sandbox-0b443c82
        type: string
      createdAt:
        example: "2026-03-20T10:15:00Z"
        type: string
      displayName:
        example: My Test Shop
        type: string
      expiresAt:
        example: "2026-03-20T12:00:00Z"
        type: string
      guestSessionId:
        example: db7fcb92-c2ff-4c20-9ac2-5a2504ab6326
        format: uuid
        type: string
      id:
        example: 0b443c82-d8a3-49a7-b59a-26ce327c7341
        format: uuid
        type: string
      imageId:
        example: 8ae13ed9-cfb1-4941-a248-bc74b9fb6a24
        format: uuid
        type: string
      lastSeenAt:
        example: "2026-03-20T10:45:00Z"
        type: string
      metadata:
        type: string
      ownerId:
        example: 5cc66f6f-5c71-4be4-9f2d-639dc4b8c8c2
        format: uuid
        type: string
      port:
        example: 8080
        type: integer
      stateReason:
        example: Snapshot wird erstellt
        type: string
      status:
        allOf:
        - $ref: '#/definitions/models.SandboxStatus'
        enum:
        - starting
        - running
        - paused
        - stopping
        - stopped
        - expired
        - deleted
        - failed
        example: running
      updatedAt:
        example: "2026-03-20T10:20:00Z"
        type: string
      url:
        example: https://sandbox-0b443c82.demo.shopshredder.de
        type: string
    type: object
  models.SandboxStatus:
    enum:
    - starting
    - running
    - paused
    - stopping
    - stopped
    - expired
    - deleted
    - failed
    type: string
    x-enum-varnames:
    - SandboxStatusStarting
    - SandboxStatusRunning
    - SandboxStatusPaused
    - SandboxStatusStopping
    - SandboxStatusStopped
    - SandboxStatusExpired
    - SandboxStatusDeleted
    - SandboxStatusFailed
  models.User:
    properties:
      createdAt:
        example: "2026-03-20T10:15:00Z"
        type: string
      email:
        example: jane.doe@example.com
        type: string
      id:
        example: 5cc66f6f-5c71-4be4-9f2d-639dc4b8c8c2
        format: uuid
        type: string
      role:
        example: user
        type: string
      updatedAt:
        example: "2026-03-20T10:20:00Z"
        type: string
