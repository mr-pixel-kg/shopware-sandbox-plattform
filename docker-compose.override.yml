services:
  traefik:
    image: traefik:v2.10
    restart: always
    ports:
      - "80:80"
      - "9000:8080"
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./proxy/traefik:/etc/traefik
    networks:
      - sandbox-network
      - internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: mpxsandbox-api:local
    ports:
      - "8080:8080"
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-database}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-mrpix_sandbox}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME:-mrpix_sandbox}
      DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      SERVER_APP_URL: ${SERVER_APP_URL:-http://localhost:8080}
      SANDBOX_URL_PREFIX: ${SANDBOX_URL_PREFIX:-sandbox-}
      SANDBOX_URL_SUFFIX: ${SANDBOX_URL_SUFFIX:-.localhost}
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - ./api/storage:/app/storage

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: mpxsandbox-web:local
    ports:
      - "8000:80"
    environment:
      WEB_API_URL: ${WEB_API_URL:-http://localhost:8080}

  database:
    ports:
      - "5432:5432"

networks:
  internal:
    external: false
    driver: bridge
