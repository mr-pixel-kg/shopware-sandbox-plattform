services:
  traefik:
    image: traefik:v2.11
    restart: always
    command:
      - --api.insecure=true
      - --api.dashboard=true
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
    ports:
      - "80:80"
      - "9000:8080"
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
    networks:
      - sandbox-network
      - internal

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: shopshredder-api:local
    ports:
      - "8080:8080"
      - "2222:2222"
    environment:
      DATABASE_HOST: ${DATABASE_HOST:-database}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-shopshredder}
      SERVER_ALLOWED_ORIGINS: ${SERVER_ALLOWED_ORIGINS}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME:-shopshredder}
      DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      SERVER_APP_URL: ${SERVER_APP_URL:-http://localhost:8080}
      SANDBOX_URL_PREFIX: ${SANDBOX_URL_PREFIX:-sandbox-}
      SANDBOX_URL_SUFFIX: ${SANDBOX_URL_SUFFIX:-.localhost}
      SSH_ENABLED: "true"
      SSH_PORT: "2222"
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./api/storage:/app/storage

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: shopshredder-web:local
    ports:
      - "8000:80"
    environment:
      WEB_API_URL: ${WEB_API_URL:-http://localhost:8080}

  database:
    ports:
      - "5432:5432"

networks:
  internal:
    external: true
