services:
  api:
    image: ghcr.io/mr-pixel-kg/mpxsandbox-api:latest
    restart: always
    expose:
      - 8080
    environment:
      CONFIG_PATH: /app/config.yml
      DOCKER_HOST: unix:///var/run/docker.sock
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - ${DOCKER_SOCKET_PATH:-/var/run/docker.sock}:/var/run/docker.sock
      - api_storage:/app/storage
    networks:
      - sandbox-network
      - internal
    depends_on:
      database:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.sandbox-api.entrypoints=websecure"
      - "traefik.http.routers.sandbox-api.rule=Host(`sandbox-api.zion.mr-pixel.de`)"
      - "traefik.http.routers.sandbox-api.tls=true"
      - "traefik.http.routers.sandbox-api.tls.certresolver=production"

  web:
    image: ghcr.io/mr-pixel-kg/mpxsandbox-web:latest
    restart: always
    expose:
      - 80
    environment:
      WEB_API_URL: ${WEB_API_URL:-https://sandbox-api.zion.mr-pixel.de}
    networks:
      - sandbox-network
      - internal
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.sandbox-web.entrypoints=websecure"
      - "traefik.http.routers.sandbox-web.rule=Host(`sandbox.zion.mr-pixel.de`)"
      - "traefik.http.routers.sandbox-web.tls=true"
      - "traefik.http.routers.sandbox-web.tls.certresolver=production"

  database:
    image: postgres:17.4
    restart: always
    shm_size: 128mb
    volumes:
      - database_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: mrpix_sandbox
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: mrpix_sandbox
    networks:
      - sandbox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mrpix_sandbox -d mrpix_sandbox"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  sandbox-network:
    driver: bridge
  internal:
    external: true

volumes:
  database_data:
    driver: local
  api_storage:
    driver: local
