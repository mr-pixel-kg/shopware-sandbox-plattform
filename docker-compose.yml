version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - GOPROXY=proxy.golang.org
      - DOCKER_HOST=unix:///Users/manuel.kienlein/.docker/run/docker.sock #unix:///var/run/docker.sock
    volumes:
      - /var/run/docker.sock:/Users/manuel.kienlein/.docker/run/docker.sock #/var/run/docker.sock
      - ./config.yml:/root/config.yml
    networks:
      - sandbox-network
    depends_on:
      - frontend

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8000:80"
    environment:
      - VITE_BACKEND_URL=http://backend:8080
    networks:
      - sandbox-network

networks:
  sandbox-network:
    driver: bridge