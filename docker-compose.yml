services:
  api:
    image: ghcr.io/mr-pixel-kg/shopshredder-api:latest
    restart: always
    expose:
      - 8080
    ports:
      - "${SSH_PORT:-2222}:${SSH_PORT:-2222}"
    environment:
      CONFIG_PATH: /app/config.yml
      DATABASE_HOST: ${DATABASE_HOST:-database}
      SERVER_ALLOWED_ORIGINS: ${SERVER_ALLOWED_ORIGINS}
      DATABASE_PORT: ${DATABASE_PORT:-5432}
      DATABASE_USER: ${DATABASE_USER:-shopshredder}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME:-shopshredder}
      DATABASE_SSLMODE: ${DATABASE_SSLMODE:-disable}
      AUTH_JWT_SECRET: ${AUTH_JWT_SECRET}
      SERVER_APP_URL: ${SERVER_APP_URL:-https://${API_DOMAIN}}
      SANDBOX_URL_PREFIX: ${SANDBOX_URL_PREFIX:-sandbox-}
      SANDBOX_URL_SUFFIX: ${SANDBOX_URL_SUFFIX:-.zion.mr-pixel.de}
      SSH_ENABLED: ${SSH_ENABLED:-true}
      SSH_PORT: ${SSH_PORT:-2222}
    volumes:
      - ${DOCKER_SOCK:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - api_storage:/app/storage
    networks:
      - sandbox-network
      - internal
    depends_on:
      database:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.sandbox-api.entrypoints=websecure"
      - "traefik.http.routers.sandbox-api.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.sandbox-api.tls=true"
      - "traefik.http.routers.sandbox-api.tls.certresolver=production"
      - "traefik.http.services.sandbox-api.loadbalancer.server.port=8080"

  web:
    image: ghcr.io/mr-pixel-kg/shopshredder-web:latest
    restart: always
    expose:
      - 80
    environment:
      WEB_API_URL: ${WEB_API_URL:-https://${API_DOMAIN}}
    networks:
      - sandbox-network
      - internal
    depends_on:
      api:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.sandbox-web.entrypoints=websecure"
      - "traefik.http.routers.sandbox-web.rule=Host(`${WEB_DOMAIN}`)"
      - "traefik.http.routers.sandbox-web.tls=true"
      - "traefik.http.routers.sandbox-web.tls.certresolver=production"

  pgadmin:
    image: dpage/pgadmin4:latest
    restart: always
    expose:
      - 80
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    networks:
      - sandbox-network
      - internal
    depends_on:
      database:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=internal"
      - "traefik.http.routers.sandbox-pgadmin.entrypoints=websecure"
      - "traefik.http.routers.sandbox-pgadmin.rule=Host(`${PGADMIN_DOMAIN}`)"
      - "traefik.http.routers.sandbox-pgadmin.tls=true"
      - "traefik.http.routers.sandbox-pgadmin.tls.certresolver=production"

  database:
    image: postgres:17.4
    restart: always
    shm_size: 128mb
    volumes:
      - database_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DATABASE_USER:-shopshredder}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME:-shopshredder}
    networks:
      - sandbox-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATABASE_USER:-shopshredder} -d ${DATABASE_NAME:-shopshredder}"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  sandbox-network:
    driver: bridge
  internal:
    external: true

volumes:
  database_data:
    driver: local
  api_storage:
    driver: local
  pgadmin_data:
    driver: local
